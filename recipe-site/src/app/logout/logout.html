<div class="modal-backdrop">
  <div class="logout-card">
    <div class="icon-warning">⚠️</div>
    <h2>Are you sure?</h2>
    <p>Do you really want to log out of your account?</p>
    
    <div class="actions">
      <button type="button" class="btn-secondary" (click)="cancel()">No, stay</button>
      <button type="button" class="btn-primary" (click)="confirmLogout()">Yes, log out</button>
    </div>
  </div>
</div>
