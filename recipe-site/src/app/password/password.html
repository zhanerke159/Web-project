<div class="account-container">
  
  <main class="account-main">
    <div class="header-top">
      <div class="logo">FoodieBook</div>
    </div>

    <nav class="breadcrumbs">
      <span class="breadcrumb-item" routerLink="/home">Home</span>
      <span class="separator">/</span>
      <span class="breadcrumb-item" routerLink="/account">Account</span>
      <span class="separator">/</span>
      <span class="breadcrumb-item active">Change Password</span>
    </nav>

    <section class="password-form-section">
      <h2 class="section-title">Change Password</h2>

      <div class="password-grid">
        <div class="form-group">
          <label>Current Password</label>
          <div class="input-with-icon">
            <input [type]="showCurrent ? 'text' : 'password'" [(ngModel)]="passwords.current">
            <button class="eye-btn" (click)="showCurrent = !showCurrent">
              <span class="eye-icon">👁</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>New Password</label>
          <div class="input-with-icon">
            <input [type]="showNew ? 'text' : 'password'" [(ngModel)]="passwords.new">
            <button class="eye-btn" (click)="showNew = !showNew">
              <span class="eye-icon">👁</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <div class="input-with-icon">
            <input [type]="showConfirm ? 'text' : 'password'" [(ngModel)]="passwords.confirm">
            <button class="eye-btn" (click)="showConfirm = !showConfirm">
              <span class="eye-icon">👁</span>
            </button>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-cancel">Cancel</button>
        <button class="btn-update" (click)="updatePassword()">UPDATE PASSWORD</button>
      </div>

      <p [ngClass]="{'error-msg': isError, 'success-msg': !isError && txt}" class="status-message">
        {{ txt }}
      </p>
    </section>
  </main>

  <aside class="profile-sidebar">
    <div class="avatar-section">
      <div class="image-container">
        <div class="image-circle">
          @if (userFields.avatar) {
            <img [src]="userFields.avatar" alt="User Avatar">
          } @else {
            <img src="https://img.freepik.com/premium-vector/people-avatar-icons-cook_755164-20671.jpg" alt="Default Avatar">
          }
        </div>
      </div>
      <h2 class="user-name">{{ userFields.username || 'Username' }}</h2>
    </div>

    <nav class="account-menu">
      <div class="menu-item" routerLink="/personal-info" routerLinkActive="active">
        <span class="menu-icon personal-icon"></span> 
        <span class="menu-text">Personal Information</span>
      </div>
      <div class="menu-item" routerLink="/change-password" routerLinkActive="active">
        <span class="menu-icon password-icon"></span> 
        <span class="menu-text">Change Password</span>
      </div>
      <div class="menu-item" routerLink="/logout" routerLinkActive="active">
        <span class="menu-icon logout-icon"></span> 
        <span class="menu-text">Log Out</span>
      </div>
    </nav>
  </aside>
</div>
