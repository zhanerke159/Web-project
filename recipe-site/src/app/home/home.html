<app-header></app-header>

<section class="hero">
  <div class="slider-container">
    <div class="slides" [style.transform]="'translateX(-' + currentSlideIndex * 100 + '%)'">
      <img *ngFor="let slide of slides" [src]="slide" alt="Delicious Food" />
    </div>

    <div class="slider-overlay"></div>

    <div class="hero-content">
      <h2 class="simply">SIMPLY</h2>
      <h2 class="delicious">DELICIOUS</h2>
    </div>

    <button class="arrow left-arrow" (click)="prevSlide()">&#10094;</button>
    <button class="arrow right-arrow" (click)="nextSlideManual()">&#10095;</button>
    <div class="dots">
      <span *ngFor="let slide of slides; let i = index" class="dot" [class.active-dot]="i === currentSlideIndex"
        (click)="goToSlide(i)">
      </span>
    </div>
  </div>
</section>





<section class="txt">
  <div class="line"></div>
  <h1 class="title">Popular Recipes</h1>
  <div class="line"></div>
</section>

<div class="pop-rec">
  <div class="category-item" [routerLink]="['/recipe', 'pizza']">
    <div class="circle-img">
      <img src="https://i.pinimg.com/736x/37/b6/60/37b660cb40988dda83c8d345f62c83da.jpg" alt="pizza">
    </div>
    <span>pizza</span>
  </div>

  <div class="category-item" [routerLink]="['/recipe', 'ceasar']">
    <div class="circle-img">
      <img src="https://i.pinimg.com/1200x/21/b7/90/21b790f325afe3e574ccf65783f1bf09.jpg" alt="Caesar">
    </div>
    <span>caesar</span>
  </div>

  <div class="category-item" [routerLink]="['/recipe', 'pasta']">
    <div class="circle-img">
      <img src="https://i.pinimg.com/1200x/46/43/27/4643272b80e0da1c64b6d36ed7ada357.jpg" alt="pasta">
    </div>
    <span>pasta</span>
  </div>

  <div class="category-item" [routerLink]="['/recipe', 'mojito']">
    <div class="circle-img">
      <img src="https://i.pinimg.com/1200x/57/cd/dd/57cddd925ee9c23164c2cfb69faf0e92.jpg" alt="mojito">
    </div>
    <span>mojito</span>
  </div>

  <div class="category-item" [routerLink]="['/recipe', 'apple pie']">
    <div class="circle-img">
      <img src="https://i.pinimg.com/736x/bf/d2/39/bfd239d78b130687d3262b6bb2520cfe.jpg" alt="apple pie">
    </div>
    <span>apple pie</span>
  </div>
</div>



<section class="cat" id="categories">
  <div class="tit">
    <h1>Categories</h1>
  </div>

  <div class="cards">
    <div class="category" *ngFor="let category of categories" [routerLink]="['/recipe', category.name]">
      <img [src]="category.image" [alt]="category.name">
      <p>{{ category.name }}</p>
    </div>
  </div>

</section>
