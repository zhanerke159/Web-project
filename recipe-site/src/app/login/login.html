<div class="main">
    <div class="left">
        <div class="title">
            <h2 class="top">FoodieBook</h2>
        </div>

        <div class="log">
            <h1>Login</h1>
            <p>Let's cook together!</p>
        </div>

        <div class="card">
            <form class="login">
                <label for="email">Email address:</label>
                <input type="email" [(ngModel)]="loginData.username" placeholder="Enter email address..." name="email">


                <label for="password">Password:</label>
                <input type="password" [(ngModel)]="loginData.password" id="password" placeholder="Enter password..." name="password">
                <div class="but">
                    <button type="button" (click) = "onLogin()" class="submit">Login</button>
                </div>
            </form>
        </div>
    </div>


    <div class="right">

        <div class="text">
            <h1>Welcome back to the kitchen!</h1>
        </div>

    </div>
</div>
