<div class="back">
    <button (click)="goHome()"> ←Back to home</button>
</div>

<div class="overlay">
    <div class="main">
        <span class="t">
            <h2 class="title">Add recipe</h2>
        </span>

        <form #recipeForm="ngForm">
            <div class="form">
                <label class="txt">Meal name:</label>
                <input type="text" [(ngModel)]="recipe.name" name="foodName" required class="styled-input"
                    placeholder="Enter name...">
            </div>

            <div class="form">
                <label>Upload photo:</label>

                <div class="file-drop-zone">

                    @if (recipe.photos.length > 0) {
                    <div class="preview-container">
                        @for (photo of recipe.photos; track $index) {
                        <div class="preview-item">
                            <img [src]="photo" alt="Recipe photo preview" class="preview-img" required>
                            <button type="button" class="remove-btn" (click)="removePhoto($index)">×</button>
                        </div>
                        }

                        <div class="add-more-card" (click)="fileInput.click()">
                            <span>+</span>
                        </div>
                    </div>
                    }

                    @if (recipe.photos.length === 0) {
                    <div class="click-area" (click)="fileInput.click()">
                        <div class="camera-icon">📷</div>
                        <span class="click">Click to upload photos...</span>
                    </div>
                    }
                </div>

                <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" multiple
                    style="display: none;">
            </div>

            <div class="form">
                <label class="txt">Description:</label>
                <textarea [(ngModel)]="recipe.description" name="description" class="styled-input" required
                    placeholder="Tell us a bit about this dish..." rows="3">
                    </textarea>
            </div>


            <label>Category</label>
            <div class="category">

                <select class="category-list" [(ngModel)]="recipe.categoryId" name="categorySelect" required>
                    <option value="" disabled selected>Choose the category..</option>
                    <option value="1">Fast-Food
                    </option>
                    <option value="2">Desserts
                    </option>
                    <option value="3">Drinks
                    </option>
                    <option value="4">Salads
                    </option>
                    <option value="5">Main dishes
                    </option>
                    <option value="6">Chinese cuisine
                    </option>
                </select>
            </div>


            <div class="form">
                <label class="txt">Ingredients:</label>
                <div class="ingredients-container">
                    <div class="ingredient-row" *ngFor="let ing of recipe.ingredients; let i = index; trackBy: trackByIndex">
                    <input type="text" [(ngModel)]="recipe.ingredients[i].name" name="ingName{{i}}"
                        placeholder="Name (e.g. flour)" class="ing-name">
                    <input type="number" [(ngModel)]="recipe.ingredients[i].amount" name="ingAmount{{i}}"
                        placeholder="Amount" class="ing-amount">
                    <input type="text" [(ngModel)]="recipe.ingredients[i].unit" name="ingUnit{{i}}"
                        placeholder="Unit (e.g. g)" class="ing-unit">
                    <button *ngIf="recipe.ingredients.length > 1" type="button" class="delete" (click)="removeIngredient(i)">x</button>
                    </div>
                    <button type="button" class="add-ingredient-btn" (click)="addIngredient()">+ Add ingredient</button>
                </div>
            </div>


            <div class="form">
                <label class="txt">Cooking time (minutes):</label>
                <input type="number" [(ngModel)]="recipe.prepTime" name="prepTime" class="styled-input" required
                    placeholder="e.g. 30">
            </div>


            <div class="steps-container">
                <h3>Cooking steps</h3>
                <div class="step-card">
                    <div class="step-item" *ngFor="let step of recipe.steps; let i = index; trackBy: trackByIndex"
                        style="margin-bottom: 15px;">
                        <label>Step {{ i + 1 }}:</label>
                        <div class="step-input-wrapper">
                            <input type="text" [(ngModel)]="recipe.steps[i]" name="step{{i}}" required
                                placeholder="Describe this step...">

                            <button *ngIf="recipe.steps.length > 1" type="button" class="delete"
                                (click)="removeStep(i)">
                                x
                            </button>
                        </div>
                    </div>
                    <div class="add-btn-div">
                        <button type="button" class="add-btn" (click)="addStep()">+</button>
                    </div>
                </div>
            </div>
        </form>

        <div class="save-btn">
            <button type="submit" class="save" (click)="saveRecipe()" [disabled]="recipeForm.invalid">Save</button>
        </div>
    </div>
</div>
