<div class="category-container">
  
  <div class="main-dishes-header">
    <div class="line"></div>
    <h1>{{ categoryTitle | titlecase }}</h1>
    <div class="line"></div>
  </div>

  <div class="recipes-grid">
    <div class="recipe-card" *ngFor="let recipe of recipes">
      
      <div class="image-container">
        <img [src]="recipe.image" [alt]="recipe.name">
      </div>
      
      <div class="recipe-info">
        <div class="title-row">
          <span class="recipe-title">{{ recipe.name }}</span>
          <span class="recipe-time">
            <svg width="14" height="14" viewBox="0 0 24 24">
              <path d="M12 2c5.52 0 10 4.48 10 10s-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2zM11 6v7h6v-2h-4V6h-2z"/>
            </svg>
            {{ recipe.time }}
          </span>
        </div>        
        
        <p class="recipe-description">{{ recipe.description }}</p>
        
        <div class="actions">
          <button class="btn-action" (click)="seeIngredients(recipe.id)">See the ingredients</button>
          <button class="btn-action" (click)="addToFavorites(recipe.id)">Add to Favorites</button>
        </div>
      </div>

    </div>
  </div>
</div>
